<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>予算比ダッシュボード</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --blue-dark:#0d47a1;--blue:#1565c0;--blue-mid:#1976d2;
  --blue-light:#42a5f5;--blue-pale:#e3f2fd;--sky:#29b6f6;
  --green:#2e7d32;--green-pale:#e8f5e9;
  --red:#c62828;--red-pale:#ffebee;
  --orange:#e65100;--orange-pale:#fff3e0;
  --off-white:#f5f9ff;--text:#1a2744;--text-mid:#3d5a80;
  --text-light:#7a99ba;--border:#d0e4f7;
  --shadow:0 2px 12px rgba(21,101,192,0.10);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--off-white);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;}

#lov{position:fixed;inset:0;background:linear-gradient(135deg,var(--blue-dark),var(--blue-mid));display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s;}
#lov.hide{opacity:0;pointer-events:none;}
.ll{color:white;font-size:20px;font-weight:800;margin-bottom:24px;}
.lbb{width:240px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;overflow:hidden;}
.lb{height:100%;background:var(--sky);border-radius:2px;animation:lp 1.8s ease-in-out infinite;}
@keyframes lp{0%{width:0%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}
.lt{color:rgba(255,255,255,0.7);font-size:11px;margin-top:12px;}

#eb{display:none;padding:10px 20px;font-size:12px;border-left:4px solid;}

header{background:linear-gradient(135deg,var(--blue-dark) 0%,var(--blue-mid) 60%,var(--sky) 100%);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:52px;box-shadow:0 2px 8px rgba(13,71,161,0.3);position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.lm{width:32px;height:32px;background:white;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:11px;color:var(--blue);}
.lt2{color:white;font-size:15px;font-weight:700;}
.ls{font-size:9px;color:rgba(255,255,255,0.75);margin-top:1px;}
.sbtn{display:flex;align-items:center;gap:5px;padding:6px 12px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.35);border-radius:6px;color:white;font-family:'Noto Sans JP',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;}
.sbtn:hover{background:rgba(255,255,255,0.25);}
.sbtn.spinning .si{animation:spin .8s linear infinite;}
.si{display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
.lsync{font-size:9px;color:rgba(255,255,255,0.6);text-align:right;margin-top:2px;}

/* フィルターバー */
.fbar{background:white;border-bottom:2px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;box-shadow:0 1px 4px rgba(21,101,192,0.06);}
.flbl{font-size:11px;font-weight:700;color:var(--text-mid);letter-spacing:0.08em;white-space:nowrap;}
.fgrp{display:flex;gap:4px;flex-wrap:wrap;}
.fb{padding:5px 14px;border:1.5px solid var(--border);border-radius:20px;background:white;color:var(--text-mid);font-family:'Noto Sans JP',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;}
.fb:hover{border-color:var(--blue-light);color:var(--blue);}
.fb.active{background:var(--blue);border-color:var(--blue);color:white;font-weight:700;}
.fsep{width:1px;height:22px;background:var(--border);flex-shrink:0;}

main{padding:18px 24px 40px;max-width:1400px;margin:0 auto;}
.mb{margin-bottom:16px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}

/* KPIサマリー */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:18px;}
.kcard{background:white;border:1px solid var(--border);border-radius:10px;padding:16px 18px;box-shadow:var(--shadow);border-top:4px solid var(--blue-light);transition:transform .15s;}
.kcard:hover{transform:translateY(-2px);}
.kc-lbl{font-size:10px;color:var(--text-light);letter-spacing:0.08em;font-weight:600;margin-bottom:6px;text-transform:uppercase;}
.kc-num{font-size:26px;font-weight:900;color:var(--blue);line-height:1;}
.kc-unit{font-size:12px;font-weight:500;}
.kc-sub{font-size:11px;margin-top:5px;}
.kc-ratio{font-size:13px;font-weight:700;margin-top:4px;}

/* 達成状況バッジ */
.over{color:var(--green);}
.under{color:var(--red);}
.badge-over{display:inline-block;padding:2px 8px;border-radius:10px;background:var(--green-pale);color:var(--green);font-size:10px;font-weight:700;}
.badge-under{display:inline-block;padding:2px 8px;border-radius:10px;background:var(--red-pale);color:var(--red);font-size:10px;font-weight:700;}
.badge-na{display:inline-block;padding:2px 8px;border-radius:10px;background:#f5f5f5;color:#999;font-size:10px;font-weight:700;}

/* カード */
.card{background:white;border:1px solid var(--border);border-radius:10px;padding:18px 20px;box-shadow:var(--shadow);}
.ct{font-size:11px;font-weight:700;color:var(--text-mid);letter-spacing:0.10em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.badge{font-size:10px;padding:2px 9px;border-radius:10px;background:var(--blue-pale);color:var(--blue);font-weight:600;}

.cwl canvas{max-height:300px;width:100%!important;}
.cw canvas{max-height:260px;width:100%!important;}

/* 予算比テーブル */
.ytable{width:100%;border-collapse:collapse;font-size:12px;}
.ytable th{padding:8px 10px;color:var(--text-mid);font-weight:700;text-align:center;border-bottom:2px solid var(--border);background:var(--off-white);white-space:nowrap;font-size:11px;}
.ytable th:first-child{text-align:left;}
.ytable td{padding:7px 10px;border-bottom:1px solid #eaf2fb;text-align:center;}
.ytable td:first-child{text-align:left;font-weight:600;color:var(--text);}
.ytable tr:last-child{background:var(--blue-pale);font-weight:700;}
.ytable tr:last-child td:first-child{color:var(--blue);}
.ratio-cell{font-weight:700;}

/* ファネル */
.funnel{display:flex;flex-direction:column;gap:8px;}
.funnel-item{display:flex;align-items:center;gap:12px;}
.funnel-lbl{font-size:11px;color:var(--text-mid);width:70px;text-align:right;flex-shrink:0;}
.funnel-bar-bg{flex:1;height:28px;background:#eaf2fb;border-radius:6px;overflow:hidden;position:relative;}
.funnel-bar{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:10px;font-size:11px;font-weight:700;color:white;transition:width .6s ease;}
.funnel-val{font-size:12px;font-weight:700;color:var(--blue);width:60px;flex-shrink:0;}

@media(max-width:900px){
  .kpi-row{grid-template-columns:repeat(3,1fr);}
  .g2,.g3{grid-template-columns:1fr;}
  main{padding:12px;}
}
</style>
</head>
<body>

<div id="lov">
  <div class="ll">予算比ダッシュボード</div>
  <div class="lbb"><div class="lb"></div></div>
  <div class="lt">スプレッドシートからデータを取得中...</div>
</div>
<div id="eb"></div>

<header>
  <div class="logo">
    <div class="lm">予算</div>
    <div>
      <div class="lt2">予算比ダッシュボード</div>
      <div class="ls">自社集客 — スプレッドシート連動</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:14px;">
    <div>
      <button class="sbtn" id="syncBtn" onclick="loadData(true)">
        <span class="si">🔄</span> 最新に更新
      </button>
      <div class="lsync" id="lastSync"></div>
    </div>
  </div>
</header>

<!-- フィルターバー -->
<div class="fbar">
  <div class="flbl">📅 期間</div>
  <div class="fgrp" id="sheetFilter">
    <button class="fb active" onclick="setSheet('累計',this)">累計</button>
    <button class="fb" onclick="setSheet('1月',this)">1月</button>
    <button class="fb" onclick="setSheet('2月',this)">2月</button>
    <button class="fb" onclick="setSheet('3月',this)">3月</button>
    <button class="fb" onclick="setSheet('4月',this)">4月</button>
    <button class="fb" onclick="setSheet('5月',this)">5月</button>
    <button class="fb" onclick="setSheet('6月',this)">6月</button>
    <button class="fb" onclick="setSheet('7月',this)">7月</button>
    <button class="fb" onclick="setSheet('８月',this)">8月</button>
    <button class="fb" onclick="setSheet('9月',this)">9月</button>
    <button class="fb" onclick="setSheet('10月',this)">10月</button>
    <button class="fb" onclick="setSheet('11月',this)">11月</button>
    <button class="fb" onclick="setSheet('12月',this)">12月</button>
  </div>
  <div class="fsep"></div>
  <div class="flbl">📊 指標</div>
  <div class="fgrp" id="metricFilter">
    <button class="fb active" onclick="setMetric('反響数',this)">反響数</button>
    <button class="fb" onclick="setMetric('契約数',this)">契約数</button>
    <button class="fb" onclick="setMetric('貢献売上',this)">貢献売上</button>
    <button class="fb" onclick="setMetric('反響来店',this)">反響来店</button>
    <button class="fb" onclick="setMetric('新規数',this)">新規数</button>
  </div>
</div>

<main>

  <!-- KPI サマリー（自社集客合計） -->
  <div class="kpi-row">
    <div class="kcard" style="border-top-color:var(--blue)">
      <div class="kc-lbl">反響数</div>
      <div class="kc-num" id="k-hankyou">—<span class="kc-unit">件</span></div>
      <div class="kc-ratio" id="k-hankyou-r">—</div>
      <div class="kc-sub" id="k-hankyou-s" style="color:var(--text-light)">予算: —件</div>
    </div>
    <div class="kcard" style="border-top-color:#43a047">
      <div class="kc-lbl">契約数</div>
      <div class="kc-num" id="k-keiyaku" style="color:#2e7d32">—<span class="kc-unit">件</span></div>
      <div class="kc-ratio" id="k-keiyaku-r">—</div>
      <div class="kc-sub" id="k-keiyaku-s" style="color:var(--text-light)">予算: —件</div>
    </div>
    <div class="kcard" style="border-top-color:#CF2E92">
      <div class="kc-lbl">貢献売上</div>
      <div class="kc-num" id="k-uriage" style="font-size:18px;padding-top:4px">—</div>
      <div class="kc-ratio" id="k-uriage-r">—</div>
      <div class="kc-sub" id="k-uriage-s" style="color:var(--text-light)">予算: —</div>
    </div>
    <div class="kcard" style="border-top-color:var(--sky)">
      <div class="kc-lbl">反響成約率</div>
      <div class="kc-num" id="k-seyaku" style="font-size:22px">—<span class="kc-unit">%</span></div>
      <div class="kc-ratio" id="k-seyaku-r">—</div>
      <div class="kc-sub" id="k-seyaku-s" style="color:var(--text-light)">予算: —%</div>
    </div>
    <div class="kcard" style="border-top-color:#fb8c00">
      <div class="kc-lbl">契約単価</div>
      <div class="kc-num" id="k-tanka" style="font-size:18px;padding-top:4px">—</div>
      <div class="kc-ratio" id="k-tanka-r">—</div>
      <div class="kc-sub" id="k-tanka-s" style="color:var(--text-light)">予算: —</div>
    </div>
  </div>

  <!-- 予算比テーブル＋グラフ -->
  <div class="g2 mb">
    <div class="card">
      <div class="ct">媒体別 予算比・前年比一覧 <span class="badge" id="b-sheet">累計</span></div>
      <div style="overflow-x:auto">
        <table class="ytable" id="yosanTable">
          <thead>
            <tr>
              <th>媒体</th>
              <th>予算</th>
              <th>実績</th>
              <th>予算比</th>
              <th>前年</th>
              <th>前年比</th>
            </tr>
          </thead>
          <tbody id="yosanBody"></tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <div class="ct">媒体別 予算比 <span class="badge" id="b-metric">反響数</span></div>
      <div class="cwl"><canvas id="ratioChart"></canvas></div>
    </div>
  </div>

  <!-- 実績 vs 予算グラフ + 前年比グラフ -->
  <div class="g2 mb">
    <div class="card">
      <div class="ct">媒体別 実績 vs 予算 <span class="badge" id="b-metric2">反響数</span></div>
      <div class="cwl"><canvas id="actualVsBudget"></canvas></div>
    </div>
    <div class="card">
      <div class="ct">媒体別 前年比 <span class="badge" id="b-metric3">反響数</span></div>
      <div class="cwl"><canvas id="yoyChart"></canvas></div>
    </div>
  </div>

  <!-- ファネル -->
  <div class="card mb">
    <div class="ct">自社集客合計 反響ファネル <span class="badge" id="b-funnel">—</span></div>
    <div class="funnel" id="funnelArea"></div>
  </div>

  <!-- 月別トレンド（累計時は非表示） -->
  <div class="card" id="trendCard">
    <div class="ct">月別トレンド <span class="badge" id="b-trend">反響数 実績 vs 予算</span></div>
    <div class="cwl"><canvas id="trendChart"></canvas></div>
  </div>

</main>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbz5JOE4Cq0dkmVH2nFewhuYRuA8gm8cL7ppz3ynYmWTqIivQqswG7R-sRHp9DVLqZMP/exec';
const MEDIA = ['Karilun','学生サイト','SNS','地域サイト','口コミ','自社集客合計'];
const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','８月','9月','10月','11月','12月'];
const MEDIA_COLOR = {
  'Karilun':'#00B9EE','学生サイト':'#1565c0','SNS':'#CF2E92',
  '地域サイト':'#fb8c00','口コミ':'#43a047','自社集客合計':'#0d47a1'
};

const TICK = {color:'#7a99ba',font:{family:'Noto Sans JP',size:10}};
const GRID = {color:'#d0e4f7'};
const LEG  = {labels:{color:'#3d5a80',font:{family:'Noto Sans JP',size:10},padding:10,boxWidth:10}};
const SC   = () => ({x:{ticks:TICK,grid:GRID},y:{ticks:TICK,grid:GRID}});

let DATA = {};
let CHARTS = {};
let curSheet = '累計';
let curMetric = '反響数';

function setSheet(s, btn){
  curSheet = s;
  document.querySelectorAll('#sheetFilter .fb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildAll();
}
function setMetric(m, btn){
  curMetric = m;
  document.querySelectorAll('#metricFilter .fb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildAll();
}

async function loadData(manual=false){
  const btn=document.getElementById('syncBtn');
  btn.classList.add('spinning');
  try{
    const res=await fetch(GAS_URL);
    if(!res.ok) throw new Error('HTTP '+res.status);
    DATA=await res.json();
    buildAll();
    const now=new Date();
    document.getElementById('lastSync').textContent=`最終更新: ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
    if(manual) showEB('✅ データを最新に更新しました','success');
    const ov=document.getElementById('lov');
    ov.classList.add('hide');
    setTimeout(()=>ov.style.display='none',500);
  }catch(e){
    showEB('⚠️ データ取得失敗: '+e.message,'error');
    document.getElementById('lov').classList.add('hide');
    setTimeout(()=>document.getElementById('lov').style.display='none',500);
  }
  btn.classList.remove('spinning');
}

function showEB(msg,type){
  const b=document.getElementById('eb');
  b.style.display='block';
  b.style.background=type==='success'?'#e8f5e9':'#fff3e0';
  b.style.borderLeftColor=type==='success'?'#43a047':'#ff6d00';
  b.style.color=type==='success'?'#1b5e20':'#bf360c';
  b.textContent=msg;
  setTimeout(()=>b.style.display='none',4000);
}

function fmt(v, metric){
  if(v===null||v===undefined) return '—';
  if(metric==='貢献売上'||metric==='契約単価') return '¥'+Math.round(v).toLocaleString();
  if(metric==='来客率'||metric==='契約率'||metric==='反響成約率') return (v*100).toFixed(1)+'%';
  return Math.round(v).toLocaleString();
}
function fmtRatio(v){
  if(v===null||v===undefined||!isFinite(v)) return null;
  return (v*100).toFixed(1)+'%';
}
function ratioClass(v){
  if(v===null||!isFinite(v)) return 'badge-na';
  return v>=1 ? 'badge-over' : 'badge-under';
}
function ratioText(v){
  const s=fmtRatio(v);
  if(!s) return '<span class="badge-na">—</span>';
  return `<span class="${ratioClass(v)}">${v>=1?'▲ ':'▼ '}${s}</span>`;
}

function destroyAll(){
  Object.values(CHARTS).forEach(c=>{try{c.destroy();}catch(e){}});
  CHARTS={};
}

function buildAll(){
  if(!DATA[curSheet]) return;
  const sd = DATA[curSheet];
  const total = sd['自社集客合計'];

  // バッジ更新
  document.getElementById('b-sheet').textContent=curSheet;
  document.getElementById('b-metric').textContent=curMetric;
  document.getElementById('b-metric2').textContent=curMetric;
  document.getElementById('b-metric3').textContent=curMetric;
  document.getElementById('b-trend').textContent=curMetric+' 実績 vs 予算';
  document.getElementById('b-funnel').textContent=curSheet;

  // ===== KPIカード =====
  function setKPI(id, metric, formatFn){
    const jisseki = total?.['実績']?.[metric];
    const yosan   = total?.['予算']?.[metric];
    const ratio   = total?.['予算比']?.[metric];
    document.getElementById('k-'+id).innerHTML = formatFn(jisseki) + (id==='hankyou'||id==='keiyaku'?'<span class="kc-unit">件</span>':id==='seyaku'?'<span class="kc-unit">%</span>':'');
    document.getElementById('k-'+id).textContent = '';

    const numEl = document.getElementById('k-'+id);
    if(metric==='貢献売上'||metric==='契約単価'){
      numEl.textContent = jisseki!=null ? '¥'+Math.round(jisseki).toLocaleString() : '—';
    } else if(metric==='反響成約率'){
      numEl.textContent = jisseki!=null ? (jisseki*100).toFixed(1)+'%' : '—';
    } else {
      numEl.textContent = jisseki!=null ? Math.round(jisseki).toLocaleString() : '—';
    }
    document.getElementById('k-'+id+'-r').innerHTML = ratioText(ratio);
    const yStr = yosan!=null ? (metric==='貢献売上'||metric==='契約単価' ? '予算: ¥'+Math.round(yosan).toLocaleString() : metric==='反響成約率' ? '予算: '+(yosan*100).toFixed(1)+'%' : '予算: '+Math.round(yosan).toLocaleString()+'件') : '予算: —';
    document.getElementById('k-'+id+'-s').textContent = yStr;
  }
  setKPI('hankyou','反響数',v=>v!=null?Math.round(v).toLocaleString():'—');
  setKPI('keiyaku','契約数',v=>v!=null?Math.round(v).toLocaleString():'—');
  setKPI('uriage','貢献売上',v=>v!=null?'¥'+Math.round(v).toLocaleString():'—');
  setKPI('seyaku','反響成約率',v=>v!=null?(v*100).toFixed(1)+'%':'—');
  setKPI('tanka','契約単価',v=>v!=null?'¥'+Math.round(v).toLocaleString():'—');

  // ===== 予算比テーブル =====
  const tbody = document.getElementById('yosanBody');
  tbody.innerHTML = '';
  MEDIA.forEach(med=>{
    const d = sd[med];
    if(!d) return;
    const j = d['実績']?.[curMetric];
    const y = d['予算']?.[curMetric];
    const yr= d['予算比']?.[curMetric];
    const p = d['前年']?.[curMetric];
    const pr= d['前年比']?.[curMetric];
    const isTot = med==='自社集客合計';
    const tr = document.createElement('tr');
    if(isTot) tr.style.background='var(--blue-pale)';
    tr.innerHTML=`
      <td style="${isTot?'color:var(--blue);font-weight:700;':''}">${med}</td>
      <td>${fmt(y,curMetric)}</td>
      <td style="font-weight:700">${fmt(j,curMetric)}</td>
      <td class="ratio-cell">${ratioText(yr)}</td>
      <td style="color:var(--text-light)">${fmt(p,curMetric)}</td>
      <td class="ratio-cell">${ratioText(pr)}</td>
    `;
    tbody.appendChild(tr);
  });

  // ===== チャート =====
  destroyAll();
  const mediaNoTotal = MEDIA.filter(m=>m!=='自社集客合計');

  // 予算比棒グラフ
  const ratioVals = mediaNoTotal.map(m=>{
    const v=sd[m]?.['予算比']?.[curMetric];
    return (v!=null&&isFinite(v)) ? parseFloat((v*100).toFixed(1)) : null;
  });
  CHARTS.ratio = new Chart('ratioChart',{type:'bar',
    data:{labels:mediaNoTotal,datasets:[{
      label:'予算比(%)',
      data:ratioVals,
      backgroundColor:ratioVals.map(v=>v==null?'#ccc':v>=100?'rgba(46,125,50,0.7)':'rgba(198,40,40,0.7)'),
      borderColor:ratioVals.map(v=>v==null?'#ccc':v>=100?'#2e7d32':'#c62828'),
      borderWidth:1.5
    }]},
    options:{
      plugins:{legend:{display:false},
        annotation:{annotations:{line100:{type:'line',yMin:100,yMax:100,borderColor:'#1565c0',borderWidth:2,borderDash:[4,4]}}}},
      scales:{...SC(),y:{...SC().y,ticks:{...TICK,callback:v=>v+'%'}}}}});

  // 実績 vs 予算
  CHARTS.avb = new Chart('actualVsBudget',{type:'bar',
    data:{labels:mediaNoTotal,datasets:[
      {label:'予算',data:mediaNoTotal.map(m=>sd[m]?.['予算']?.[curMetric]||0),backgroundColor:'rgba(21,101,192,0.2)',borderColor:'#1565c0',borderWidth:1.5},
      {label:'実績',data:mediaNoTotal.map(m=>sd[m]?.['実績']?.[curMetric]||0),backgroundColor:mediaNoTotal.map(m=>{
        const r=sd[m]?.['予算比']?.[curMetric];
        return (r!=null&&isFinite(r)&&r>=1)?'rgba(46,125,50,0.7)':'rgba(198,40,40,0.7)';
      }),borderWidth:0}
    ]},
    options:{plugins:{legend:LEG},scales:SC()}});

  // 前年比棒グラフ
  const yoyVals = mediaNoTotal.map(m=>{
    const v=sd[m]?.['前年比']?.[curMetric];
    return (v!=null&&isFinite(v)) ? parseFloat((v*100).toFixed(1)) : null;
  });
  CHARTS.yoy = new Chart('yoyChart',{type:'bar',
    data:{labels:mediaNoTotal,datasets:[{
      label:'前年比(%)',
      data:yoyVals,
      backgroundColor:yoyVals.map(v=>v==null?'#ccc':v>=100?'rgba(2,136,209,0.7)':'rgba(230,81,0,0.7)'),
      borderWidth:0
    }]},
    options:{plugins:{legend:{display:false}},
      scales:{...SC(),y:{...SC().y,ticks:{...TICK,callback:v=>v+'%'}}}}});

  // ファネル
  if(total){
    const steps=[
      {lbl:'反響数',  val:total['実績']?.['反響数'],   yosan:total['予算']?.['反響数']},
      {lbl:'反響来店', val:total['実績']?.['反響来店'], yosan:total['予算']?.['反響来店']},
      {lbl:'新規数',  val:total['実績']?.['新規数'],   yosan:total['予算']?.['新規数']},
      {lbl:'契約数',  val:total['実績']?.['契約数'],   yosan:total['予算']?.['契約数']},
    ];
    const base = steps[0].val||1;
    document.getElementById('funnelArea').innerHTML = steps.map(s=>{
      const pct = Math.round((s.val||0)/base*100);
      const ratio = s.yosan ? (s.val/s.yosan*100).toFixed(0) : null;
      const rBadge = ratio ? `<span class="${parseFloat(ratio)>=100?'badge-over':'badge-under'}" style="font-size:10px;margin-left:6px">${parseFloat(ratio)>=100?'▲':'▼'} ${ratio}%</span>` : '';
      return `<div class="funnel-item">
        <div class="funnel-lbl">${s.lbl}</div>
        <div class="funnel-bar-bg">
          <div class="funnel-bar" style="width:${pct}%;background:${pct>60?'#1565c0':pct>30?'#29b6f6':'#90caf9'}">${Math.round(s.val||0)}件</div>
        </div>
        <div class="funnel-val">${pct}%${rBadge}</div>
      </div>`;
    }).join('');
  }

  // 月別トレンド（累計以外で表示）
  const trendCard = document.getElementById('trendCard');
  if(curSheet==='累計'){
    // 累計タブのときは全月の推移を表示
    trendCard.style.display='block';
    const trendLabels = MONTHS.filter(m=>DATA[m]);
    const trendJisseki = trendLabels.map(m=>DATA[m]?.['自社集客合計']?.['実績']?.[curMetric]||0);
    const trendYosan   = trendLabels.map(m=>DATA[m]?.['自社集客合計']?.['予算']?.[curMetric]||0);
    CHARTS.trend = new Chart('trendChart',{type:'line',
      data:{labels:trendLabels,datasets:[
        {label:'予算',data:trendYosan,borderColor:'#1565c020',backgroundColor:'transparent',borderWidth:2,borderDash:[5,4],pointRadius:3,tension:0.3},
        {label:'実績',data:trendJisseki,borderColor:'#1565c0',backgroundColor:'rgba(21,101,192,0.07)',borderWidth:2.5,fill:true,pointRadius:4,tension:0.3}
      ]},
      options:{plugins:{legend:LEG},scales:SC()}});
  } else {
    trendCard.style.display='none';
  }
}

window.addEventListener('load',()=>loadData(false));
</script>
</body>
</html>
